apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: pingpong
  namespace: exercises
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pingpong
  strategy:
    canary:
      steps:
      - setWeight: 30
      - pause:
          duration: 30s
      - analysis:
          templates:
          - templateName: track-cpu-usage
  template:
    metadata:   
      labels:
        app: pingpong
    spec:
#      volumes:
#        - name: shared-volume
#          persistentVolumeClaim:
#            claimName: volume-claim
      containers:
        - name: pingpong
          image: misetius/pingpong:2.8
          imagePullPolicy: Always
          env:
          - name: PORT
            value: "3006"
          readinessProbe:
            initialDelaySeconds: 120
            periodSeconds: 120
            httpGet:
              path: /pingpong
              port: 3006
#          volumeMounts:
#          - name: shared-volume
#            mountPath: /usr/src/app/pongs

