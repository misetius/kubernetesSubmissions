apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: track-cpu-usage
spec:
  metrics:
  - name: track-cpu-usage
    initialDelay: 3m
    successCondition: result[0] < 0
    provider:
      prometheus:
        address: http://kube-prometheus-stack-1773-prometheus.prometheus.svc.cluster.local:9090 # DNS name for my Prometheus, find yours with kubectl describe svc ...
        query: |
          scalar(
          sum(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{namespace="exercises"})
          )